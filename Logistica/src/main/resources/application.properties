spring.application.name=logistica-service
server.port=8082

# ============================================================
# Configuración de Base de Datos PostgreSQL
# ============================================================
spring.datasource.url=jdbc:postgresql://localhost:5432/logistica_db
spring.datasource.driverClassName=org.postgresql.Driver
spring.datasource.username=donaton
spring.datasource.password=donaton123

# Hibernate / JPA
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Desactivar data.sql automático (la carga se hace con DataLoader.java)
spring.sql.init.mode=always
spring.jpa.defer-datasource-initialization=true

# Eureka Config
eureka.client.service-url.defaultZone=${EUREKA_URI:http://localhost:8761/eureka/}
eureka.instance.preferIpAddress=true
spring.sql.init.separator=^
