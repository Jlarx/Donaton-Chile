server.port=8084
spring.application.name=usuarios-service

# ============================================================
# Configuración de Base de Datos PostgreSQL
# ============================================================
spring.datasource.url=jdbc:postgresql://localhost:5432/usuarios_db
spring.datasource.driverClassName=org.postgresql.Driver
spring.datasource.username=donaton
spring.datasource.password=donaton123

# Hibernate / JPA
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Eureka Config
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.instance.preferIpAddress=true

# JWT Secret
jwt.secret=ThisIsASecretKeyForJwtWhichMustBeAtLeast32BytesLongSoHereItIs
jwt.expiration=86400000
