server.port=8084
spring.application.name=usuarios-service

# Database Config (H2)
spring.datasource.url=jdbc:h2:file:./data/usuarios;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;AUTO_RECONNECT=TRUE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Eureka Config
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.instance.preferIpAddress=true

# JWT Secret
jwt.secret=ThisIsASecretKeyForJwtWhichMustBeAtLeast32BytesLongSoHereItIs
jwt.expiration=86400000
