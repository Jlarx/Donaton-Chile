version: '3.8'

services:
  eureka-server:
    build: ./EurekaServer
    ports:
      - "8761:8761"
    networks:
      - donaton-network

  usuarios-service:
    build: ./Usuarios
    ports:
      - "8084:8084"
    environment:
      - SPRING_EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-server:8761/eureka/
      - EUREKA_INSTANCE_PREFER_IP_ADDRESS=true
    depends_on:
      - eureka-server
    networks:
      - donaton-network

  donaciones-service:
    build: ./Donaciones
    ports:
      - "8081:8081"
    environment:
      - SPRING_EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-server:8761/eureka/
      - EUREKA_INSTANCE_PREFER_IP_ADDRESS=true
    depends_on:
      - eureka-server
    networks:
      - donaton-network

  logistica-service:
    build: ./Logistica
    ports:
      - "8082:8082"
    environment:
      - SPRING_EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-server:8761/eureka/
      - EUREKA_INSTANCE_PREFER_IP_ADDRESS=true
    depends_on:
      - eureka-server
    networks:
      - donaton-network

  necesidades-service:
    build: ./Necesidades
    ports:
      - "8083:8083"
    environment:
      - SPRING_EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-server:8761/eureka/
      - EUREKA_INSTANCE_PREFER_IP_ADDRESS=true
    depends_on:
      - eureka-server
    networks:
      - donaton-network

  central-gateway:
    build: ./Central
    ports:
      - "8080:8080"
    environment:
      - SPRING_EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-server:8761/eureka/
      - EUREKA_INSTANCE_PREFER_IP_ADDRESS=true
    depends_on:
      - eureka-server
    networks:
      - donaton-network

  portal-frontend:
    build: ./Portal
    ports:
      - "5173:5173"
    depends_on:
      - central-gateway
    networks:
      - donaton-network

networks:
  donaton-network:
    driver: bridge
