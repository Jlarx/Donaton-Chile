version: '3.8'

services:
  # ============================================================
  # Base de Datos PostgreSQL compartida (Database per Service)
  # ============================================================
  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: donaton
      POSTGRES_PASSWORD: donaton123
      POSTGRES_DB: donaton
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./scripts/init-databases.sql:/docker-entrypoint-initdb.d/init-databases.sql
    networks:
      - donaton-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U donaton"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============================================================
  # Eureka Server (Service Discovery)
  # ============================================================
  eureka-server:
    build: ./EurekaServer
    ports:
      - "8761:8761"
    networks:
      - donaton-network

  # ============================================================
  # Microservicio Usuarios
  # ============================================================
  usuarios-service:
    build: ./Usuarios
    ports:
      - "8084:8084"
    environment:
      - SPRING_EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-server:8761/eureka/
      - EUREKA_INSTANCE_PREFER_IP_ADDRESS=true
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/usuarios_db
      - SPRING_DATASOURCE_USERNAME=donaton
      - SPRING_DATASOURCE_PASSWORD=donaton123
      - SPRING_DATASOURCE_DRIVER_CLASS_NAME=org.postgresql.Driver
      - SPRING_JPA_DATABASE_PLATFORM=org.hibernate.dialect.PostgreSQLDialect
    depends_on:
      postgres:
        condition: service_healthy
      eureka-server:
        condition: service_started
    networks:
      - donaton-network

  # ============================================================
  # Microservicio Donaciones
  # ============================================================
  donaciones-service:
    build: ./Donaciones
    ports:
      - "8081:8081"
    environment:
      - SPRING_EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-server:8761/eureka/
      - EUREKA_INSTANCE_PREFER_IP_ADDRESS=true
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/donaciones_db
      - SPRING_DATASOURCE_USERNAME=donaton
      - SPRING_DATASOURCE_PASSWORD=donaton123
      - SPRING_DATASOURCE_DRIVER_CLASS_NAME=org.postgresql.Driver
      - SPRING_JPA_DATABASE_PLATFORM=org.hibernate.dialect.PostgreSQLDialect
    depends_on:
      postgres:
        condition: service_healthy
      eureka-server:
        condition: service_started
    networks:
      - donaton-network

  # ============================================================
  # Microservicio Logística
  # ============================================================
  logistica-service:
    build: ./Logistica
    ports:
      - "8082:8082"
    environment:
      - SPRING_EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-server:8761/eureka/
      - EUREKA_INSTANCE_PREFER_IP_ADDRESS=true
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/logistica_db
      - SPRING_DATASOURCE_USERNAME=donaton
      - SPRING_DATASOURCE_PASSWORD=donaton123
      - SPRING_DATASOURCE_DRIVER_CLASS_NAME=org.postgresql.Driver
      - SPRING_JPA_DATABASE_PLATFORM=org.hibernate.dialect.PostgreSQLDialect
    depends_on:
      postgres:
        condition: service_healthy
      eureka-server:
        condition: service_started
    networks:
      - donaton-network

  # ============================================================
  # Microservicio Necesidades
  # ============================================================
  necesidades-service:
    build: ./Necesidades
    ports:
      - "8083:8083"
    environment:
      - SPRING_EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-server:8761/eureka/
      - EUREKA_INSTANCE_PREFER_IP_ADDRESS=true
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/necesidades_db
      - SPRING_DATASOURCE_USERNAME=donaton
      - SPRING_DATASOURCE_PASSWORD=donaton123
      - SPRING_DATASOURCE_DRIVER_CLASS_NAME=org.postgresql.Driver
      - SPRING_JPA_DATABASE_PLATFORM=org.hibernate.dialect.PostgreSQLDialect
    depends_on:
      postgres:
        condition: service_healthy
      eureka-server:
        condition: service_started
    networks:
      - donaton-network

  # ============================================================
  # API Gateway Central (BFF)
  # ============================================================
  central-gateway:
    build: ./Central
    ports:
      - "8080:8080"
    environment:
      - SPRING_EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-server:8761/eureka/
      - EUREKA_INSTANCE_PREFER_IP_ADDRESS=true
    depends_on:
      - eureka-server
    networks:
      - donaton-network

  # ============================================================
  # Portal Frontend (React / Vite)
  # ============================================================
  portal-frontend:
    build: ./Portal
    ports:
      - "5173:5173"
    depends_on:
      - central-gateway
    networks:
      - donaton-network

volumes:
  postgres-data:

networks:
  donaton-network:
    driver: bridge
