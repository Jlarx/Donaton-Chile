<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40" fill="none">
  <defs>
    <linearGradient id="logoGrad" x1="0" y1="0" x2="40" y2="40" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#a855f7"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- Heart base shape -->
  <path d="M20 34C20 34 6 24.5 6 14.5C6 10.36 9.36 7 13.5 7C15.97 7 18.17 8.16 20 10C21.83 8.16 24.03 7 26.5 7C30.64 7 34 10.36 34 14.5C34 24.5 20 34 20 34Z" fill="url(#logoGrad)" opacity="0.9" filter="url(#glow)"/>
  <!-- Inner network nodes: upward arrow-like path -->
  <circle cx="20" cy="17" r="2" fill="white" opacity="0.95"/>
  <circle cx="14" cy="21" r="1.5" fill="white" opacity="0.75"/>
  <circle cx="26" cy="21" r="1.5" fill="white" opacity="0.75"/>
  <line x1="20" y1="17" x2="14" y2="21" stroke="white" stroke-width="1" opacity="0.6"/>
  <line x1="20" y1="17" x2="26" y2="21" stroke="white" stroke-width="1" opacity="0.6"/>
  <!-- Top arrow going up from center node -->
  <line x1="20" y1="17" x2="20" y2="12" stroke="white" stroke-width="1.2" opacity="0.85"/>
  <polygon points="20,10 18,13 22,13" fill="white" opacity="0.9"/>
</svg>
