name: Donaton CI Pipeline

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main", "develop" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout del Repositorio
      uses: actions/checkout@v3

    - name: Configurar Java JDK 17
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven

    - name: Compilar y Testear Microservicios
      run: mvn clean test jacoco:report -B

    - name: Validar Cobertura (Opcional - Muestra artefactos en GitHub)
      uses: actions/upload-artifact@v3
      with:
        name: jacoco-reports
        path: "**/target/site/jacoco/*"
