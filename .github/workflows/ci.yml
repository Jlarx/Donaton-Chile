name: Donaton CI Pipeline

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main", "develop" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout del Repositorio
      uses: actions/checkout@v4

    - name: Configurar Java JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven

    - name: Compilar y Testear Microservicios
      run: mvn clean test jacoco:report -B

    - name: Validar Cobertura (Opcional - Muestra artefactos en GitHub)
      uses: actions/upload-artifact@v4
      with:
        name: jacoco-reports
        path: "**/target/site/jacoco/*"

      #cada vez que nuestro equipo suban código nuevo a GitHub (git push), GitHub lee ese archivo y automáticamente en sus servidores ocultos hara: Instala Java 17. Descarga tu proyecto. Ejecuta internamente el comando que recién usaste (..\mvnw.cmd clean test jacoco:report).Revisara si hay errores tambien.
