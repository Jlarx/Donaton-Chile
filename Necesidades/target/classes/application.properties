# Puerto asignado para este microservicio
spring.application.name=necesidades-service
server.port=8083

# Configuración de base de datos H2 en archivo (Persistencia Real)
spring.datasource.url=jdbc:h2:file:./data/necesidades_db;AUTO_SERVER=TRUE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=password

# Hibernate creará las tablas automáticamente basado en las Entidades
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update

# Habilitar consola web para poder revisar los datos en H2
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Ver las sentencias SQL generadas por Hibernate en consola
spring.jpa.show-sql=true
